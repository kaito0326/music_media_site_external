<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indie Music Media – 新しい音楽を発見しよう</title>
  <link rel="stylesheet" href="style.css">
  <!-- Icons are optional; we avoid external CDNs for offline environments -->
</head>
<body>
  <header class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1>Indie Music Media</h1>
      <p>地下音楽シーンを毎日お届け</p>
      <a href="#explore" class="cta">今すぐ探す</a>
    </div>
  </header>

  <!-- Trending section -->
  <section id="trending" class="section">
    <h2>注目トピック</h2>
    <div class="cards" id="trending-cards">
      <!-- dynamically populated -->
    </div>
  </section>

  <!-- Search/Filter section -->
  <section id="explore" class="section">
    <h2>音楽を探す</h2>
    <div class="filters">
      <div class="filter">
        <label for="genre-select">ジャンル</label>
        <select id="genre-select">
          <option value="all">すべて</option>
          <option value="ロック">ロック</option>
          <option value="ポップ">ポップ</option>
          <option value="フォーク">フォーク</option>
          <option value="ジャズ">ジャズ</option>
          <option value="クラシック">クラシック</option>
          <option value="エレクトロニカ">エレクトロニカ</option>
          <option value="ラテン">ラテン</option>
        </select>
      </div>
      <div class="filter">
        <label for="mood-select">気分 / 時間帯</label>
        <select id="mood-select">
          <option value="all">すべて</option>
          <option value="エネルギー">エネルギー</option>
          <option value="懐かしさ">懐かしさ</option>
          <option value="リラックス">リラックス</option>
          <option value="夜">夜</option>
          <option value="朝">朝</option>
          <option value="集中">集中</option>
          <option value="パーティー">パーティー</option>
        </select>
      </div>
      <button id="search-btn">検索</button>
    </div>
    <div id="results" class="cards">
      <!-- search results appear here -->
    </div>
  </section>

  <!-- Admin/Update section (visible for demo) -->

  <footer>
    <p>&copy; 2026 Indie Music Media. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
